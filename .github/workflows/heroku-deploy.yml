name: CI/CD — Heroku

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: heroku-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run smoke tests
        env:
          APP_SECRET: ci-test-secret-not-for-production
        run: pytest tests/ -v

  deploy:
    name: Deploy to Heroku
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.0
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          branch: master

      - name: Verify deployment
        run: |
          sleep 15
          curl -fsS "https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/api/health"

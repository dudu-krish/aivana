name: CI/CD - Heroku

# Manual only — use render-deploy.yml for automatic deploys.
on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run smoke tests
        env:
          APP_SECRET: ci-test-secret-not-for-production
        run: pytest tests/ -v

  deploy:
    name: Deploy to Heroku
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.0
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          branch: master

      - name: Verify deployment
        env:
          APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          if [ -z "$APP_NAME" ]; then
            echo "::error::HEROKU_APP_NAME secret is not set."
            exit 1
          fi
          sleep 15
          curl -fsS "https://${APP_NAME}.herokuapp.com/api/health"

name: CI/CD — Render

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run smoke tests
        env:
          APP_SECRET: ci-test-secret-not-for-production
        run: pytest tests/ -v

  deploy:
    name: Deploy to Render
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ secrets.RENDER_SERVICE_URL }}
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set. See RENDER.md"
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for deployment
        run: |
          BASE="${{ secrets.RENDER_SERVICE_URL }}"
          if [ -z "$BASE" ]; then
            echo "RENDER_SERVICE_URL secret is not set. See RENDER.md"
            exit 1
          fi
          HEALTH="${BASE%/}/api/health"
          echo "Waiting for $HEALTH ..."
          for i in $(seq 1 36); do
            if curl -fsS "$HEALTH"; then
              echo ""
              echo "Deployment healthy."
              exit 0
            fi
            echo "Attempt $i/36 — not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Health check timed out after 6 minutes."
          exit 1

# Render Blueprint for https://github.com/dudu-krish/aivana
# CI/CD: GitHub Actions triggers deploy via RENDER_DEPLOY_HOOK (autoDeploy disabled).
# After first deploy, set APP_BASE_URL and OAUTH_REDIRECT_URI in the Render dashboard.

services:
  - type: web
    name: aivana
    runtime: docker
    plan: free
    region: oregon
    branch: master
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_SECRETS_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false

# Render Blueprint — free tier (see RENDER.md)
# After deploy, set APP_BASE_URL and OAUTH_REDIRECT_URI to your *.onrender.com URL.

services:
  - type: web
    name: agent-studio
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    dockerCommand: ""
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_CLIENT_SECRETS_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
